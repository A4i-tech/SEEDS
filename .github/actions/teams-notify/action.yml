name: Dispatch Teams Notification
description: Send an Adaptive Card to Microsoft Teams via an incoming webhook.
inputs:
  summary:
    description: Short summary shown in the Teams notification.
    required: true
  activity-title:
    description: Main title rendered inside the Teams card.
    required: true
  theme-color:
    description: Hex color used to highlight the notification (FF0000 for Red/Failure).
    required: false
    default: '0076D7'
  facts:
    description: "JSON array of facts."
    required: false
    default: '[]'
  teams-webhook-url:
    description: Incoming Microsoft Teams webhook URL.
    required: true

runs:
  using: composite
  steps:
    - name: Dispatch notification to Microsoft Teams
      shell: bash
      env:
        FACTS_INPUT: ${{ inputs.facts }}
        WEBHOOK_URL_INPUT: ${{ inputs.teams-webhook-url }}
        SUMMARY_INPUT: ${{ inputs.summary }}
        ACTIVITY_INPUT: ${{ inputs.activity-title }}
        COLOR_INPUT: ${{ inputs.theme-color }}
      run: |
        set -euo pipefail

        if [ -z "$WEBHOOK_URL_INPUT" ]; then
          echo "Error: TEAMS_WEBHOOK_URL input not provided."
          exit 1
        fi

        FACTS='[]'

        add_fact() {
          local name="$1"
          local value="$2"
          if [ -z "$value" ]; then return; fi
          # Note: We build standard name/value here, we will map to title/value for Adaptive Card later
          FACTS="$(jq --arg name "$name" --arg value "$value" '. + [{"name":$name,"value":$value}]' <<< "$FACTS")"
        }

        # Add standard facts
        add_fact "Branch" "${{ github.ref_name }}"
        add_fact "Commit" "${{ github.sha }}"
        add_fact "Actor" "${{ github.actor }}"

        # Merge user-provided facts
        if [ -n "$(echo "$FACTS_INPUT" | tr -d '[:space:]')" ]; then
          FACTS="$(jq --argjson extra "$FACTS_INPUT" '. + $extra' <<< "$FACTS")"
        fi

        PAYLOAD="$(jq -cn \
          --arg title "$ACTIVITY_INPUT" \
          --arg summary "$SUMMARY_INPUT" \
          --arg color "$COLOR_INPUT" \
          --argjson facts "$FACTS" \
          '{
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "contentUrl": null,
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.2",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": $title,
                      "weight": "Bolder",
                      "size": "Medium",
                      "color": (if $color == "FF0000" then "Attention" else "Good" end)
                    },
                    {
                      "type": "TextBlock",
                      "text": $summary,
                      "isSubtle": true,
                      "wrap": true
                    },
                    {
                      "type": "FactSet",
                      "facts": ($facts | map({title: .name, value: .value}))
                    }
                  ]
                }
              }
            ]
          }' \
        )"
        
        echo "Sending payload..."
        curl -v -f -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "$WEBHOOK_URL_INPUT"