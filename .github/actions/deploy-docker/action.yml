name: Deploy Docker Image
description: Build and deploy Docker image to Container Registry
inputs:
    context:
        required: true
    image:
        required: true
    github_token:
        required: true
    registry:
        required: true
    username:
        required: true
    repository:
        description: "GitHub repository in the format owner/repo"
        required: true
    environment_tag:
        description: "Environment tag (e.g., prod, staging)"
        required: false
        default: "latest"
    build_args:
        description: "Docker build arguments as newline-separated KEY=VALUE pairs"
        required: false
        default: ""
runs:
    using: composite
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Log in to Container Registry
          uses: docker/login-action@v3
          with:
              registry: ${{ inputs.registry }}
              username: ${{ inputs.username }}
              password: ${{ inputs.github_token }}

        - name: Extract metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
              images: ${{ inputs.registry }}/${{ inputs.repository }}/${{ inputs.image }}
              tags: type=raw,value=${{ inputs.environment_tag }}

        - name: Build and push Docker image
          uses: docker/build-push-action@v5
          with:
              context: ${{ inputs.context }}
              push: true
              tags: ${{ steps.meta.outputs.tags }}
              labels: ${{ steps.meta.outputs.labels }}
              build-args: |
                  ${{ inputs.build_args }}
