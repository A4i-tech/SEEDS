name: Deploy to Azure
description: Build and deploy application to Azure App Service
inputs:
  app_name:
    description: "Azure App Service name"
    required: true
  publish_profile:
    description: "Azure publish profile XML content"
    required: true
  image:
    description: "Docker image to deploy"
    required: true

runs:
  using: composite
  steps:
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ inputs.app_name }}
        publish-profile: ${{ inputs.publish_profile }}
        images: ${{ inputs.image }}
    - name: Azure deployment confirmation
      shell: bash
      run: |
        echo "Deployment to Azure Web App '${{ inputs.app_name }}' triggered."
