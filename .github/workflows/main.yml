name: Execute Workflows

on:
  push:
    branches: [a4i/main, a4i/staging]
  pull_request:
    branches: [a4i/main]
  workflow_dispatch:

jobs:

  deploy-websocket-service-main-workflow:
    if: github.ref == 'refs/heads/a4i/main'
    uses: ./.github/workflows/deploy-websocket-service-main.yml
    secrets: inherit

  deploy-websocket-service-staging-workflow:
    if: github.ref == 'refs/heads/a4i/staging'
    uses: ./.github/workflows/deploy-websocket-service-staging.yml
    secrets: inherit

  deploy-staging-workflow:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/a4i/staging') || github.event_name == 'pull_request'
    uses: ./.github/workflows/deploy-staging.yml
    secrets: inherit

  deploy-main-workflow:
    if: github.ref == 'refs/heads/a4i/main'
    uses: ./.github/workflows/deploy-main.yml
    secrets: inherit

  run-android-tests:
    if: github.ref == 'refs/heads/a4i/staging' || github.ref == 'refs/heads/a4i/main'
    uses: ./.github/workflows/android-tests.yml
    secrets: inherit

  deploy-android:
    needs: run-android-tests
    if: github.ref == 'refs/heads/a4i/staging' || github.ref == 'refs/heads/a4i/main'
    uses: ./.github/workflows/android-deploy.yml
    secrets: inherit

  run-coverage-summary:
    needs: deploy-staging-workflow
    uses: ./.github/workflows/coverage-summary.yml
    secrets: inherit

  notify-teams:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - deploy-websocket-service-main-workflow
      - deploy-websocket-service-staging-workflow
      - deploy-staging-workflow
      - deploy-main-workflow
      - run-android-tests
      - deploy-android
      - run-coverage-summary
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Notification Layout
        id: layout
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          JOB_MAPPING='{
            "deploy-websocket-service-main-workflow": "Websocket",
            "deploy-websocket-service-staging-workflow": "Websocket",
            "deploy-staging-workflow": "Backend",
            "deploy-main-workflow": "Backend",
            "deploy-android": "Android"
          }'

          COLUMNS_JSON=$(jq -n -c \
            --arg url "$RUN_URL" \
            --argjson needs "$NEEDS_JSON" \
            --argjson map "$JOB_MAPPING" \
            '
            ($needs | to_entries | map(select(.value.result != "skipped") | select($map[.key] != null))) as $jobs |
            
            [
              {
                "type": "ColumnSet",
                "spacing": "Medium",
                "columns": (
                  $jobs | map({
                    "type": "Column",
                    "width": "stretch",
                    "items": [
                      {
                        "type": "TextBlock",
                        "text": $map[.key],
                        "weight": "Bolder",
                        "size": "Default"
                      },
                      {
                        "type": "TextBlock",
                        "text": (if .value.result == "success" then "Built and deployed" else "Failed" end),
                        "size": "Small",
                        "wrap": true,
                        "color": (if .value.result == "success" then "Default" else "Attention" end)
                      },
                      {
                        "type": "TextBlock",
                        "text": "[Open](\($url))",
                        "size": "Small",
                        "color": "Accent"
                      }
                    ]
                  })
                )
              }
            ]'
          )
          
          echo "columns_json=$COLUMNS_JSON" >> $GITHUB_OUTPUT

      - name: Send Teams Notification
        uses: ./.github/actions/teams-notify
        with:
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          activity-title: "SEEDS"
          summary: "Deployment details for ${{ github.ref_name }}"
          theme-color: "${{ contains(needs.*.result, 'failure') && 'FF0000' || '00FF00' }}"
          custom-sections: ${{ steps.layout.outputs.columns_json }}
