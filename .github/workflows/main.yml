name: Execute Workflows

on:
  push:
    branches: [a4i/main, a4i/staging,teams-alert]
  workflow_dispatch:

jobs:

  deploy-websocket-service-main-workflow:
    if: github.ref == 'refs/heads/a4i/main'
    uses: ./.github/workflows/deploy-websocket-service-main.yml
    secrets: inherit

  deploy-websocket-service-staging-workflow:
    if: github.ref == 'refs/heads/a4i/staging'
    uses: ./.github/workflows/deploy-websocket-service-staging.yml
    secrets: inherit

  deploy-staging-workflow:
    if: github.ref == 'refs/heads/a4i/staging'
    uses: ./.github/workflows/deploy-staging.yml
    secrets: inherit

  deploy-main-workflow:
    if: github.ref == 'refs/heads/a4i/main'
    uses: ./.github/workflows/deploy-main.yml
    secrets: inherit

  deploy-android:
    if: github.ref == 'refs/heads/a4i/staging' || github.ref == 'refs/heads/a4i/main'
    uses: ./.github/workflows/android-deploy.yml
    secrets: inherit

  run-coverage-summary:
    needs: deploy-staging-workflow
    uses: ./.github/workflows/coverage-summary.yml
    secrets: inherit

  notify-teams:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - deploy-websocket-service-main-workflow
      - deploy-websocket-service-staging-workflow
      - deploy-staging-workflow
      - deploy-main-workflow
      - deploy-android
      - run-coverage-summary
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Notification Facts
        id: facts
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          IS_FAILURE: ${{ contains(needs.*.result, 'failure') }}
        run: |
          JOB_MAPPING='{
            "deploy-websocket-service-main-workflow": "Websocket Main",
            "deploy-websocket-service-staging-workflow": "Websocket Staging",
            "deploy-staging-workflow": "Webservice Staging",
            "deploy-main-workflow": "Webservice Main",
            "deploy-android": "Android Staging"
          }'

          if [[ "$IS_FAILURE" == "true" ]]; then
            STAGE_VAL="Workflow Failed"
          else
            STAGE_VAL="Workflow Complete"
          fi

          FINAL_JSON=$(jq -n -c \
            --arg url "$RUN_URL" \
            --arg stage "$STAGE_VAL" \
            --argjson needs "$NEEDS_JSON" \
            --argjson map "$JOB_MAPPING" \
            '
            [
              { "name": "Workflow", "value": $url },
              { "name": "Stage", "value": $stage }
            ] + (
              $needs | to_entries | map(
                select(.value.result != "skipped") | 
                select($map[.key] != null) | 
                { 
                  "name": $map[.key], 
                  "value": .value.result 
                }
              )
            )'
          )

          echo "facts_json=$FINAL_JSON" >> $GITHUB_OUTPUT

      - name: Send Teams Notification
        uses: ./.github/actions/teams-notify
        with:
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          activity-title: "CI/CD Notifications"
          summary: "Workflow ${{ contains(needs.*.result, 'failure') && 'Failed' || 'Complete' }} for ${{ github.ref_name }}"
          theme-color: "${{ contains(needs.*.result, 'failure') && 'FF0000' || '00FF00' }}"
          facts: ${{ steps.facts.outputs.facts_json }}    
