name: WebSocket Service Main

on:
  workflow_dispatch:
  push:
    branches: [a4i/main]
    paths:
      - "websocket-service/**"
  pull_request:
    branches: [a4i/main]
    paths:
      - "websocket-service/**"
  workflow_call:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/websocket-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd websocket-service && npm ci
      - name: Run tests with coverage
        run: cd websocket-service && npm run test
      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: websocket-service-coverage
          path: |
            websocket-service/coverage/
          retention-days: 30
      - name: Extract coverage percentage
        id: coverage
        run: |
          cd websocket-service
          COVERAGE=$(node -e "
          try {
            const fs = require('fs');
            if (fs.existsSync('coverage/coverage-summary.json')) {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const pct = coverage.total.lines.pct;
              console.log(pct);
            } else {
              console.log('0');
            }
          } catch (e) {
            console.log('0');
          }
          ")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"
      - name: Create coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.COVERAGE_GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: websocket-service-coverage.json
          label: WebSocket Service Coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.percentage > 80 && 'brightgreen' || steps.coverage.outputs.percentage > 60 && 'yellow' || 'red' }}

  deploy-to-docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/a4i/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./websocket-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-azure:
    needs: deploy-to-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/a4i/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Azure Webhook deployment
        run: |
          echo "Triggering deployment for websocket-service via Azure webhook..."
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.WEBSOCKET_AZURE_DEPLOY_HOOK_URL }}")
          echo "HTTP Status Code: $http_code"
          if [[ $http_code == "200" || $http_code == "202" ]]; then
            echo "Deployment triggered successfully"
          else
            echo "Failed to trigger deployment (HTTP $http_code)"
            exit 1
          fi