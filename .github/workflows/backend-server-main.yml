name: Backend Server Main

on:
  push:
    branches: [a4i/main, testing-pipeline-seeds]
    paths:
      - "backend-server/**"
  pull_request:
    branches: [a4i/main, testing-pipeline-seeds]
    paths:
      - "backend-server/**"
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend-server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd backend-server && npm ci
      - name: Run tests
        run: cd backend-server && npm test

  deploy-to-docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name : Verify Docker image
        run: |
          docker pull ghcr.io/${{ github.repository }}/backend-server:latest

  deploy-to-render:
    needs: deploy-to-docker
    if: (vars.DEPLOYMENT_TARGET == 'render' || vars.DEPLOYMENT_TARGET == 'both' || vars.DEPLOYMENT_TARGET == '' || vars.DEPLOYMENT_TARGET == null)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Deploy to Render
        uses: JorgeLNJunior/render-deploy@v1.4.5
        with:
          service_id: ${{ vars.BACKEND_SERVER_RENDER_SERVICE_ID }}
          api_key: ${{ secrets.RENDER_API_KEY_FOR_GITHUB_ACTIONS }}
          github_deployment: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          wait_deploy: true

  deploy-to-azure:
    needs: deploy-to-docker
    if: (vars.DEPLOYMENT_TARGET == 'azure' || vars.DEPLOYMENT_TARGET == 'both')
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ vars.BACKEND_SERVER_AZURE_WEBAPP_NAME}}
          resource-group-name: ${{ vars.BACKEND_SERVER_AZURE_RESOURCE_GROUP }}
          images: ghcr.io/${{ github.repository }}/backend-server:latest

      - name: Azure deployment confirmation
        run: |
          echo "Azure deployment completed for backend-server"
