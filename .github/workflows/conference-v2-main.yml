name: Conference V2 Main

on:
  push:
    branches: [a4i/main, testing-pipeline-seeds]
    paths:
      - "ConferenceV2/**"
  pull_request:
    branches: [a4i/main, testing-pipeline-seeds]
    paths:
      - "ConferenceV2/**"
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/conference-v2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: ConferenceV2/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: cd ConferenceV2 && poetry install --with test
      - name: Run tests with coverage
        run: cd ConferenceV2 && poetry run pytest --cov=. --cov-report=html --cov-report=xml --cov-report=json --cov-report=term
      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conference-v2-coverage
          path: |
            ConferenceV2/htmlcov/
            ConferenceV2/coverage.xml
            ConferenceV2/coverage.json
            ConferenceV2/.coverage
          retention-days: 30
      - name: Extract coverage percentage
        id: coverage
        run: |
          cd ConferenceV2
          COVERAGE=$(poetry run python -c "
          try:
              import json
              with open('coverage.json', 'r') as f:
                  data = json.load(f)
              coverage = round(data['totals']['percent_covered'], 1)
              print(coverage)
          except Exception as e:
              print('0')
          ")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"
      - name: Create coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.COVERAGE_GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: conference-v2-coverage.json
          label: ConferenceV2 Coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.percentage > 80 && 'brightgreen' || steps.coverage.outputs.percentage > 60 && 'yellow' || 'red' }}

  deploy-to-docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ConferenceV2
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-render:
    needs: deploy-to-docker
    if: (vars.DEPLOYMENT_TARGET == 'render' || vars.DEPLOYMENT_TARGET == 'both' || vars.DEPLOYMENT_TARGET == '' || vars.DEPLOYMENT_TARGET == null)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          echo "Triggering deployment for ConferenceV2..."
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.CONFERENCE_V2_RENDER_DEPLOY_HOOK_URL }}")
          echo "HTTP Status Code: $http_code"
          if [[ $http_code == "200" || $http_code == "202" ]]; then
            echo "Deployment triggered successfully"
          else
            echo "Failed to trigger deployment (HTTP $http_code)"
            exit 1
          fi

  deploy-to-azure:
    needs: deploy-to-docker
    if: (vars.DEPLOYMENT_TARGET == 'azure' || vars.DEPLOYMENT_TARGET == 'both')
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ vars.CONFERENCE_V2_AZURE_WEBAPP_NAME}}
          resource-group-name: ${{ vars.CONFERENCE_V2_AZURE_RESOURCE_GROUP }}
          images: ghcr.io/${{ github.repository }}/conference-v2:latest

      - name: Azure deployment confirmation
        run: |
          echo "Azure deployment completed for conference-v2"
