name: Deploy Android Build

on:
  push:
    branches: 
      - a4i/staging
      - a4i/main
      - 2026.01.01 
  pull_request:
    branches: 
      - a4i/staging
      - a4i/main  
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.9'
          bundler-cache: false
          working-directory: ./Teacher-App

      - name: Add Linux platform to Gemfile.lock
        working-directory: ./Teacher-App
        run: bundle lock --add-platform x86_64-linux

      - name: Install gems
        working-directory: ./Teacher-App
        run: bundle install

      - name: Make Gradle executable
        working-directory: ./Teacher-App
        run: chmod +x gradlew

      - name: Build and Deploy Staging
        if: github.ref == 'refs/heads/a4i/staging' && github.event_name == 'push'
        working-directory: ./Teacher-App
        env:
          STAGING_BASE_URL:               ${{ secrets.BASE_URL_ANDROID_STAGING }}
          STAGING_CONTENT_URL:            ${{ secrets.CONTENT_URL_ANDROID_STAGING }}
          STAGING_TENANT_NAME:            ${{ secrets.FIREBASE_TESTER_GROUPS_ANDROID_STAGING }}
          FIREBASE_STAGING_APP_ID:        ${{ secrets.FIREBASE_APP_ID_ANDROID_STAGING }}
          FIREBASE_STAGING_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS_ANDROID_STAGING }}
          FIREBASE_CLI_TOKEN:             ${{ secrets.FIREBASE_CLI_TOKEN }}

          STAGING_KEYSTORE_BASE64:        ${{ secrets.STAGING_KEYSTORE_BASE64 }}
          STAGING_KEYSTORE_PASSWORD:      ${{ secrets.STAGING_KEYSTORE_PASSWORD }}
          STAGING_KEY_ALIAS:              ${{ secrets.STAGING_KEY_ALIAS }}
          STAGING_KEY_PASSWORD:           ${{ secrets.STAGING_KEY_PASSWORD }}
        run: bundle exec fastlane deploy_staging

      - name: Extract Version from PR Title
        if: (github.ref == 'refs/heads/a4i/main' || github.ref == 'refs/heads/2026.01.01') && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Searching for PR associated with commit ${{ github.sha }}..."
          
          PR_JSON=$(gh pr list --search "${{ github.sha }}" --state merged --json title,url)
          
          echo "Raw PR JSON: $PR_JSON"
          
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.[0].title')
          
          if [[ "$PR_TITLE" == "null" || -z "$PR_TITLE" ]]; then
            echo "Error: No merged PR found for this commit. The version cannot be determined."
            echo "Make sure you merged a PR into this branch."
            exit 1
          fi

          echo " Found PR Title: $PR_TITLE"
          
          if [[ $PR_TITLE =~ ([0-9]{4}\.[0-9]{2}\.[0-9]{2}) ]]; then
            DETECTED_VERSION="${BASH_REMATCH[1]}"
            echo "Version detected: $DETECTED_VERSION"
            echo "CI_VERSION_NAME=$DETECTED_VERSION" >> $GITHUB_ENV
          else
            echo " Error: PR Title '$PR_TITLE' does not contain a version pattern like '2025.11.01'."
            echo "Please ensure your PR title is named correctly (e.g., 'Release 2025.11.01')."
            exit 1
          fi

      - name: Build and Deploy Production
        if: (github.ref == 'refs/heads/a4i/main' || github.ref == 'refs/heads/2026.01.01') && github.event_name == 'push'
        working-directory: ./Teacher-App
        env:
          # This must match the variable set above
          CI_VERSION_NAME:             ${{ env.CI_VERSION_NAME }}

          PROD_BASE_URL:               ${{ secrets.BASE_URL_ANDROID_STAGING }}
          PROD_CONTENT_URL:            ${{ secrets.CONTENT_URL_ANDROID_STAGING }}
          PROD_TENANT_NAME:            ${{ secrets.FIREBASE_TESTER_GROUPS_ANDROID_STAGING }}
          FIREBASE_PROD_APP_ID:        ${{ secrets.FIREBASE_APP_ID_ANDROID_STAGING }}
          FIREBASE_PROD_TESTER_GROUPS: ${{ secrets.LOCAL_TESTERS }}
          FIREBASE_CLI_TOKEN:          ${{ secrets.FIREBASE_CLI_TOKEN }}

          SIGNING_KEYSTORE_BASE64:     ${{ secrets.STAGING_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD:   ${{ secrets.STAGING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS:           ${{ secrets.STAGING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:        ${{ secrets.STAGING_KEY_PASSWORD }}

        run: bundle exec fastlane deploy_prod