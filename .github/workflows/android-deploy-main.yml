name: Deploy Android Production Build

on:
  push:
    branches: [a4i/main, prod-lane]
  pull_request:
    branches: [a4i/main]
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' 
          bundler-cache: true 
          working-directory: ./Teacher-App

      - name: Make Gradle executable
        working-directory: ./Teacher-App
        run: chmod +x gradlew

      - name: Build and Deploy Production with Fastlane
        if: github.ref == 'refs/heads/prod-lane'
        working-directory: ./Teacher-App
        env:

          BASE_URL:               ${{ secrets.CONFERENCE_V2_AZURE_PUBLISH_PROFILE }}
          CONTENT_URL:            ${{ secrets.CONFERENCE_V2_AZURE_PUBLISH_PROFILE }}
          TENANT_NAME:            ${{ secrets.FIREBASE_PROD_TESTER_GROUPS }}
          FIREBASE_APP_ID:        ${{ secrets.FIREBASE_APP_ID_ANDROID_STAGING }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_PROD_TESTER_GROUPS }}
          FIREBASE_CLI_TOKEN:     ${{ secrets.FIREBASE_CLI_TOKEN }}

          SIGNING_KEYSTORE_BASE64: ${{ secrets.PROD_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.PROD_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.PROD_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.PROD_KEY_PASSWORD }}
        run: bundle exec fastlane deploy_prod