name: Backend Server Main

on:
  push:
    paths:
      - 'backend-server/**'
  pull_request:
    paths:
      - 'backend-server/**'

jobs:
  test:
    uses: ./.github/workflows/backend-server/test.yml
  
  deploy-to-docker:
    needs: test
    if: github.ref == 'refs/heads/a4i/main' && github.event_name == 'push'
    uses: ./.github/workflows/backend-server/deploy-docker.yml
    secrets: inherit

  deploy-to-render:
    needs: deploy-to-docker
    if: github.ref == 'refs/heads/a4i/main' && github.event_name == 'push'
    uses: ./.github/workflows/backend-server/deploy-render.yml
    secrets: inherit
    with:
      service_name: backend-server
