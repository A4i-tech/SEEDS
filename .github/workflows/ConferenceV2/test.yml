name: Conference V2 Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd ConferenceV2 && pip install -r requirements.txt
      - name: Run tests
        run: cd ConferenceV2 && python -m pytest