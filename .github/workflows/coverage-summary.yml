name: Coverage Summary

on:
  pull_request:
    branches: [a4i/main, testing-pipeline-seeds]
  workflow_call:
  workflow_run:
    workflows: ["Execute backend-server-main"]
    types:
      - completed

jobs:
  aggregate-coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success')
    permissions:
      pull-requests: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: coverage-artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm install -g istanbul-merge
          pip install lxml beautifulsoup4

      - name: Aggregate coverage data
        id: aggregate
        run: |
          # Create coverage summary script
          cat > aggregate_coverage.py << 'EOF'
          import json
          import os
          import glob
          from pathlib import Path

          def extract_node_coverage(coverage_dir):
              summary_file = os.path.join(coverage_dir, 'coverage-summary.json')
              if os.path.exists(summary_file):
                  with open(summary_file, 'r') as f:
                      data = json.load(f)
                  return {
                      'lines': data['total']['lines']['pct'],
                      'statements': data['total']['statements']['pct'],
                      'functions': data['total']['functions']['pct'],
                      'branches': data['total']['branches']['pct']
                  }
              return None

          def extract_python_coverage(coverage_dir):
              json_file = os.path.join(coverage_dir, 'coverage.json')
              if os.path.exists(json_file):
                  with open(json_file, 'r') as f:
                      data = json.load(f)
                  return {
                      'lines': round(data['totals']['percent_covered'], 1),
                      'statements': round(data['totals']['percent_covered'], 1),
                      'functions': 0,  # Python coverage doesn't track functions the same way
                      'branches': round(data['totals']['percent_covered_display'], 1) if 'percent_covered_display' in data['totals'] else 0
                  }
              return None

          # Services and their types
          services = {
              'backend-server': 'node',
              'teacher-webapp': 'node', 
              'content-webapp': 'node',
              'websocket-service': 'node',
              'conference-v2': 'python',
              'ivr-v2': 'python'
          }

          coverage_data = {}
          total_lines = 0
          total_services = 0

          for service, service_type in services.items():
              coverage_dir = f'coverage-artifacts/{service}-coverage'
              if os.path.exists(coverage_dir):
                  if service_type == 'node':
                      coverage = extract_node_coverage(coverage_dir)
                  else:
                      coverage = extract_python_coverage(coverage_dir)
                  
                  if coverage:
                      coverage_data[service] = coverage
                      total_lines += coverage['lines']
                      total_services += 1
                      print(f"{service}: {coverage['lines']}%")

          # Calculate overall average
          overall_coverage = round(total_lines / total_services, 1) if total_services > 0 else 0

          # Generate markdown report
          report = "## 📊 Test Coverage Report\n\n"
          report += f"**Overall Coverage: {overall_coverage}%**\n\n"
          report += "| Service | Coverage | Status |\n"
          report += "|---------|----------|--------|\n"

          for service, coverage in coverage_data.items():
              status = "🟢" if coverage['lines'] >= 80 else "🟡" if coverage['lines'] >= 60 else "🔴"
              service_name = service.replace('-', ' ').title()
              report += f"| {service_name} | {coverage['lines']}% | {status} |\n"

          # Add services without coverage
          for service in services.keys():
              if service not in coverage_data:
                  service_name = service.replace('-', ' ').title()
                  report += f"| {service_name} | No tests | ⚫ |\n"

          report += "\n### 📈 Coverage Details\n\n"
          for service, coverage in coverage_data.items():
              service_name = service.replace('-', ' ').title()
              report += f"**{service_name}:**\n"
              report += f"- Lines: {coverage['lines']}%\n"
              report += f"- Statements: {coverage['statements']}%\n"
              if coverage['functions'] > 0:
                  report += f"- Functions: {coverage['functions']}%\n"
              if coverage['branches'] > 0:
                  report += f"- Branches: {coverage['branches']}%\n"
              report += "\n"

          report += "---\n"
          report += "*Coverage data collected from automated tests in CI pipeline*\n"

          # Write report to file
          with open('coverage_report.md', 'w') as f:
              f.write(report)

          print(f"::set-output name=overall_coverage::{overall_coverage}")
          print(f"::set-output name=services_tested::{total_services}")
          print(f"::set-output name=total_services::{len(services)}")
          EOF

          python aggregate_coverage.py

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverageReport = fs.readFileSync('coverage_report.md', 'utf8');

            // Find existing coverage comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(comment => 
              comment.user.login === 'github-actions[bot]' && 
              comment.body.includes('📊 Test Coverage Report')
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: coverageReport
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: coverageReport
              });
            }

      - name: Upload aggregated coverage
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-coverage-report
          path: |
            coverage_report.md
            coverage-artifacts/
          retention-days: 30

  update-coverage-badges:
    runs-on: ubuntu-latest
    needs: aggregate-coverage
    if: github.ref == 'refs/heads/a4i/main' || github.ref == 'refs/heads/testing-pipeline-seeds'
    steps:
      - name: Update overall coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GITHUB_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: overall-coverage.json
          label: Overall Coverage
          message: ${{ needs.aggregate-coverage.outputs.overall_coverage }}%
          color: ${{ needs.aggregate-coverage.outputs.overall_coverage > 80 && 'brightgreen' || needs.aggregate-coverage.outputs.overall_coverage > 60 && 'yellow' || 'red' }}
