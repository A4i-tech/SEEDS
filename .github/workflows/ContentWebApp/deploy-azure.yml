name: Deploy to Azure

on:
  workflow_call:
    inputs:
      service_name: 
        description: 'Name of the service being deployed'
        required: false
        type: string
        default: 'content-webapp'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Static Web App
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CONTENT_WEBAPP }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "/ContentWebApp/build"
        skip_app_build: true

    - name: Azure deployment confirmation
      run: |
        echo "Azure Static Web App deployment completed for ${{ inputs.service_name }}"