name: Teacher Web App Main

on:
  push:
    branches: [a4i/main, testing-pipeline-seeds]
    paths:
      - "teacher-webapp/**"
  pull_request:
    branches: [a4i/main, testing-pipeline-seeds]
    paths:
      - "teacher-webapp/**"
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/teacher-webapp

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd teacher-webapp && npm ci
      - name: Run tests with coverage
        run: cd teacher-webapp && npm test -- --coverage --watchAll=false
        env:
          CI: true
      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teacher-webapp-coverage
          path: |
            teacher-webapp/coverage/
          retention-days: 30
      - name: Extract coverage percentage
        id: coverage
        run: |
          cd teacher-webapp
          COVERAGE=$(node -e "
          try {
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const pct = coverage.total.lines.pct;
            console.log(pct);
          } catch (e) {
            console.log('0');
          }
          ")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"
      - name: Create coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.COVERAGE_GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: teacher-webapp-coverage.json
          label: Teacher WebApp Coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.percentage > 80 && 'brightgreen' || steps.coverage.outputs.percentage > 60 && 'yellow' || 'red' }}

  deploy-to-docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./teacher-webapp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-render:
    needs: deploy-to-docker
    if: (vars.DEPLOYMENT_TARGET == 'render' || vars.DEPLOYMENT_TARGET == 'both' || vars.DEPLOYMENT_TARGET == '' || vars.DEPLOYMENT_TARGET == null)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          echo "Triggering deployment for teacher-webapp..."
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.TEACHER_WEBAPP_RENDER_DEPLOY_HOOK_URL }}")
          echo "HTTP Status Code: $http_code"
          if [[ $http_code == "200" || $http_code == "202" ]]; then
            echo "Deployment triggered successfully"
          else
            echo "Failed to trigger deployment (HTTP $http_code)"
            exit 1
          fi

  deploy-to-azure:
    needs: deploy-to-docker
    if: (vars.DEPLOYMENT_TARGET == 'azure' || vars.DEPLOYMENT_TARGET == 'both')
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ vars.TEACHER_WEBAPP_AZURE_WEBAPP_NAME}}
          resource-group-name: ${{ vars.TEACHER_WEBAPP_AZURE_RESOURCE_GROUP }}
          images: ghcr.io/${{ github.repository }}/teacher-webapp:latest

      - name: Azure deployment confirmation
        run: |
          echo "Azure deployment completed for teacher-webapp"
